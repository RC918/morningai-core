# MorningAI Core - Render.com Service Configuration
# Updated for current project structure with Docker

services:
  # Main API Service
  - type: web
    name: morningai-core
    runtime: docker
    plan: starter  # Free tier for staging
    region: oregon  # US West
    branch: main
    rootDir: .
    dockerfilePath: ./Dockerfile  # Use our simplified Dockerfile
    
    # Environment variables
    envVars:
      - key: ENVIRONMENT
        value: staging
      - key: PORT
        value: 8000
      - key: PYTHONPATH
        value: /app
      # Database URL will be set manually after creating services
      - key: DATABASE_URL
        sync: false  # Set manually in Render dashboard
    
    # Health check configuration
    healthCheckPath: /health
    
    # Auto-deploy on push to main
    autoDeploy: true
    
    # Build command (Docker handles this)
    buildCommand: ""

