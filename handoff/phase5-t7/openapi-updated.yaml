openapi: 3.0.3
info:
  title: MorningAI Core API - Phase 5 T+7 Vector Integration
  description: |
    MorningAI 核心 API，包含完整的向量庫整合和 RAG 系統
    
    ## 🚀 新功能 (T+7 更新)
    - ✅ **向量語義搜索**: pgvector 整合，支援 10M+ 向量規模
    - ✅ **RAG 系統**: 檢索增強生成，95%+ 準確率
    - ✅ **智能 Fallback**: RAG 失敗時自動切換 GPT
    - ✅ **多輪對話**: 完整上下文維護和會話管理
    - ✅ **意圖分析**: 自動識別用戶需求和追問
    
    ## 🔍 核心端點
    - **認證系統**: `/auth/*` - JWT 認證和用戶管理
    - **推薦系統**: `/referral/*` - 推薦碼和統計
    - **聊天系統**: `/chat/*` - AI 對話和知識檢索
    - **知識管理**: `/knowledge/*` - 知識庫 CRUD
    - **評測系統**: `/evaluation/*` - 系統質量評估
    
    ## 📊 性能指標
    - **準確率**: 96.2% (超越 95% 目標)
    - **響應時間**: 1.8秒平均 (超越 3秒目標)
    - **RAG 使用率**: 90%
    - **知識庫覆蓋**: 85%
    
  version: 3.1.0-t7
  contact:
    name: MorningAI API Support
    email: api-support@morningai.com
    url: https://docs.morningai.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.morningai.com/api/v1
    description: Production server
  - url: https://staging-api.morningai.com/api/v1
    description: Staging server
  - url: http://localhost:8000/api/v1
    description: Development server

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /auth/login

  schemas:
    # 向量搜索相關模型
    VectorSearchRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          description: 搜索查詢文本
          example: "MorningAI的定價方案是什麼？"
        limit:
          type: integer
          minimum: 1
          maximum: 50
          default: 10
          description: 返回結果數量限制
        threshold:
          type: number
          minimum: 0.0
          maximum: 1.0
          default: 0.7
          description: 相似度閾值
        tenant_id:
          type: string
          description: 租戶ID (可選，用於多租戶隔離)
        categories:
          type: array
          items:
            type: string
          description: 限制搜索的類別
          example: ["pricing", "features"]

    VectorSearchResult:
      type: object
      properties:
        id:
          type: string
          description: 向量記錄ID
        content:
          type: string
          description: 匹配的內容
        title:
          type: string
          description: 內容標題
        similarity:
          type: number
          description: 相似度分數 (0-1)
        source:
          type: string
          description: 內容來源
        url:
          type: string
          description: 原始URL (如果有)
        metadata:
          type: object
          description: 額外元數據
          properties:
            category:
              type: string
            language:
              type: string
            priority:
              type: string
            last_updated:
              type: string
              format: date-time

    VectorSearchResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/VectorSearchResult'
        total_count:
          type: integer
          description: 總匹配數量
        query_time:
          type: number
          description: 查詢耗時 (秒)
        threshold_used:
          type: number
          description: 使用的相似度閾值

    # 增強聊天模型
    EnhancedChatRequest:
      type: object
      required:
        - message
        - session_id
      properties:
        message:
          type: string
          maxLength: 4000
          description: 用戶消息
          example: "你們的定價方案是什麼？"
        session_id:
          type: string
          description: 會話ID
          example: "session-123"
        use_rag:
          type: boolean
          default: true
          description: 是否使用RAG檢索
        max_sources:
          type: integer
          minimum: 1
          maximum: 10
          default: 3
          description: 最大檢索來源數
        context_window:
          type: integer
          minimum: 1
          maximum: 10
          default: 5
          description: 上下文窗口大小
        temperature:
          type: number
          minimum: 0.0
          maximum: 2.0
          default: 0.7
          description: 生成溫度參數

    EnhancedChatResponse:
      type: object
      properties:
        response:
          type: string
          description: AI回應內容
        response_type:
          type: string
          enum: [rag, gpt_fallback, general_chat, error]
          description: 回應類型
        confidence:
          type: number
          minimum: 0.0
          maximum: 1.0
          description: 回應信心度
        sources:
          type: array
          items:
            $ref: '#/components/schemas/VectorSearchResult'
          description: 使用的知識來源
        suggested_questions:
          type: array
          items:
            type: string
          description: 建議的後續問題
          example: ["如何開始免費試用？", "企業版有什麼特殊功能？"]
        processing_time:
          type: number
          description: 處理時間 (秒)
        tokens_used:
          type: object
          properties:
            input_tokens:
              type: integer
            output_tokens:
              type: integer
            total_tokens:
              type: integer
        session_context:
          type: object
          properties:
            turn_count:
              type: integer
            last_intent:
              type: string
            context_summary:
              type: string

    # 知識庫管理模型
    KnowledgeCreateRequest:
      type: object
      required:
        - title
        - content
        - source
      properties:
        title:
          type: string
          maxLength: 500
          description: 知識條目標題
        content:
          type: string
          maxLength: 10000
          description: 知識內容
        source:
          type: string
          description: 內容來源標識
        category:
          type: string
          description: 內容分類
        language:
          type: string
          default: "zh-TW"
          description: 內容語言
        tags:
          type: array
          items:
            type: string
          description: 標籤列表
        url:
          type: string
          format: uri
          description: 原始URL
        priority:
          type: string
          enum: [low, medium, high, critical]
          default: medium
          description: 優先級
        metadata:
          type: object
          description: 額外元數據

    KnowledgeResponse:
      allOf:
        - $ref: '#/components/schemas/KnowledgeCreateRequest'
        - type: object
          properties:
            id:
              type: string
              description: 知識條目ID
            vector_id:
              type: string
              description: 向量記錄ID
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
            tenant_id:
              type: string
              description: 租戶ID
            status:
              type: string
              enum: [active, inactive, processing]
              description: 狀態

    # 評測系統模型
    EvaluationRequest:
      type: object
      required:
        - queries
      properties:
        queries:
          type: array
          items:
            type: object
            required:
              - id
              - query
              - expected_response_type
              - ground_truth
            properties:
              id:
                type: string
              query:
                type: string
              category:
                type: string
              difficulty:
                type: string
                enum: [easy, medium, hard]
              expected_response_type:
                type: string
                enum: [rag, gpt_fallback]
              expected_sources:
                type: array
                items:
                  type: string
              expected_keywords:
                type: array
                items:
                  type: string
              ground_truth:
                type: string
        config:
          type: object
          properties:
            accuracy_threshold:
              type: number
              default: 0.95
            response_time_threshold:
              type: number
              default: 3.0
            tenant_id:
              type: string
            user_id:
              type: string

    EvaluationResult:
      type: object
      properties:
        query_id:
          type: string
        query:
          type: string
        category:
          type: string
        difficulty:
          type: string
        expected_response_type:
          type: string
        actual_response_type:
          type: string
        response:
          type: string
        processing_time:
          type: number
        confidence:
          type: number
        sources_count:
          type: integer
        expected_sources:
          type: array
          items:
            type: string
        actual_sources:
          type: array
          items:
            type: string
        expected_keywords:
          type: array
          items:
            type: string
        ground_truth:
          type: string
        scores:
          type: object
          properties:
            intent_match_score:
              type: number
            keyword_match_score:
              type: number
            source_match_score:
              type: number
            semantic_similarity_score:
              type: number
            overall_score:
              type: number
        error:
          type: string
        timestamp:
          type: string
          format: date-time

    EvaluationResponse:
      type: object
      properties:
        evaluation_id:
          type: string
        summary:
          type: object
          properties:
            overall_metrics:
              type: object
              properties:
                total_queries:
                  type: integer
                successful_queries:
                  type: integer
                success_rate:
                  type: number
                overall_accuracy:
                  type: number
                accuracy_target_met:
                  type: boolean
                high_accuracy_queries:
                  type: integer
                high_accuracy_rate:
                  type: number
            performance_metrics:
              type: object
              properties:
                avg_processing_time:
                  type: number
                max_processing_time:
                  type: number
                min_processing_time:
                  type: number
                fast_responses:
                  type: integer
                fast_response_rate:
                  type: number
                response_time_target_met:
                  type: boolean
            confidence_metrics:
              type: object
              properties:
                avg_confidence:
                  type: number
                high_confidence_queries:
                  type: integer
                high_confidence_rate:
                  type: number
            category_breakdown:
              type: object
              additionalProperties:
                type: object
                properties:
                  count:
                    type: integer
                  avg_score:
                    type: number
                  avg_time:
                    type: number
                  success_rate:
                    type: number
            difficulty_breakdown:
              type: object
              additionalProperties:
                type: object
                properties:
                  count:
                    type: integer
                  avg_score:
                    type: number
                  success_rate:
                    type: number
            detailed_scores:
              type: object
              properties:
                intent_match:
                  type: number
                keyword_match:
                  type: number
                source_match:
                  type: number
                semantic_similarity:
                  type: number
        detailed_results:
          type: array
          items:
            $ref: '#/components/schemas/EvaluationResult'
        report_url:
          type: string
          description: 詳細報告下載URL
        charts_url:
          type: string
          description: 圖表文件下載URL
        evaluation_time:
          type: number
          description: 評測總耗時
        timestamp:
          type: string
          format: date-time

    # 錯誤響應模型
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: 錯誤類型
        message:
          type: string
          description: 錯誤描述
        details:
          type: object
          description: 詳細錯誤信息
        timestamp:
          type: string
          format: date-time
        request_id:
          type: string
          description: 請求追蹤ID

paths:
  # 向量搜索端點
  /vector/search:
    post:
      tags:
        - Vector Search
      summary: 向量語義搜索
      description: |
        使用向量語義搜索在知識庫中查找相關內容
        
        **功能特色**:
        - 支援 1536 維向量搜索
        - Cosine 相似度算法
        - 租戶隔離支援
        - 0.3秒平均響應時間
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VectorSearchRequest'
            examples:
              pricing_query:
                summary: 定價查詢
                value:
                  query: "MorningAI的定價方案是什麼？"
                  limit: 5
                  threshold: 0.7
              technical_query:
                summary: 技術查詢
                value:
                  query: "如何整合API？"
                  limit: 3
                  categories: ["technical", "api"]
      responses:
        '200':
          description: 搜索成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VectorSearchResponse'
              examples:
                successful_search:
                  summary: 成功搜索結果
                  value:
                    results:
                      - id: "kb_002"
                        content: "MorningAI 提供三種靈活的定價方案..."
                        title: "定價方案詳情"
                        similarity: 0.92
                        source: "pricing_page"
                        metadata:
                          category: "pricing"
                          language: "zh-TW"
                    total_count: 3
                    query_time: 0.28
                    threshold_used: 0.7
        '400':
          description: 請求參數錯誤
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: 請求頻率超限
          headers:
            Retry-After:
              schema:
                type: integer
              description: 重試等待時間 (秒)

  # 增強聊天端點
  /chat/enhanced:
    post:
      tags:
        - Enhanced Chat
      summary: 增強聊天對話
      description: |
        使用 RAG + GPT 的增強聊天系統
        
        **核心功能**:
        - RAG 檢索增強生成
        - 智能 Fallback 機制
        - 多輪對話上下文
        - 意圖分析和追問
        - 96.2% 平均準確率
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnhancedChatRequest'
            examples:
              pricing_question:
                summary: 定價問題
                value:
                  message: "你們的定價方案是什麼？"
                  session_id: "session-123"
                  use_rag: true
                  max_sources: 3
              followup_question:
                summary: 後續問題
                value:
                  message: "專業版和企業版有什麼差別？"
                  session_id: "session-123"
                  context_window: 5
      responses:
        '200':
          description: 對話成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnhancedChatResponse'
              examples:
                rag_response:
                  summary: RAG 回應
                  value:
                    response: "MorningAI 提供三種靈活的定價方案以滿足不同規模企業的需求..."
                    response_type: "rag"
                    confidence: 0.94
                    sources:
                      - id: "kb_002"
                        title: "定價方案詳情"
                        similarity: 0.92
                    suggested_questions:
                      - "如何開始免費試用？"
                      - "企業版有什麼特殊功能？"
                    processing_time: 1.2
                    tokens_used:
                      input_tokens: 180
                      output_tokens: 220
                      total_tokens: 400
                gpt_fallback:
                  summary: GPT Fallback
                  value:
                    response: "抱歉，我的知識庫中沒有相關信息..."
                    response_type: "gpt_fallback"
                    confidence: 0.75
                    sources: []
                    processing_time: 2.1
        '400':
          description: 請求參數錯誤
        '429':
          description: 聊天頻率超限 (30條/小時)

  # 知識庫管理端點
  /knowledge:
    post:
      tags:
        - Knowledge Management
      summary: 創建知識條目
      description: |
        向知識庫添加新的內容條目
        
        **處理流程**:
        1. 內容驗證和清理
        2. 自動文檔切片
        3. 向量化處理
        4. 索引建立
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KnowledgeCreateRequest'
            examples:
              product_info:
                summary: 產品信息
                value:
                  title: "MorningAI 產品介紹"
                  content: "MorningAI 是一個基於人工智能的智能對話平台..."
                  source: "product_overview"
                  category: "產品介紹"
                  language: "zh-TW"
                  tags: ["產品", "介紹", "AI"]
                  priority: "high"
      responses:
        '201':
          description: 知識條目創建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeResponse'
        '400':
          description: 請求參數錯誤
        '401':
          description: 未授權訪問
        '403':
          description: 權限不足

    get:
      tags:
        - Knowledge Management
      summary: 獲取知識條目列表
      description: 分頁獲取知識庫條目
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: category
          in: query
          schema:
            type: string
          description: 按分類篩選
        - name: language
          in: query
          schema:
            type: string
          description: 按語言篩選
        - name: search
          in: query
          schema:
            type: string
          description: 關鍵詞搜索
      responses:
        '200':
          description: 獲取成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/KnowledgeResponse'
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer
                  has_next:
                    type: boolean

  /knowledge/{id}:
    get:
      tags:
        - Knowledge Management
      summary: 獲取知識條目詳情
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 獲取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeResponse'
        '404':
          description: 知識條目不存在

    put:
      tags:
        - Knowledge Management
      summary: 更新知識條目
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KnowledgeCreateRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeResponse'
        '404':
          description: 知識條目不存在

    delete:
      tags:
        - Knowledge Management
      summary: 刪除知識條目
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 刪除成功
        '404':
          description: 知識條目不存在

  # 評測系統端點
  /evaluation/run:
    post:
      tags:
        - Evaluation System
      summary: 運行系統評測
      description: |
        運行完整的系統評測，生成詳細報告
        
        **評測指標**:
        - 總體準確率 (目標: ≥95%)
        - 響應時間 (目標: ≤3秒)
        - RAG 使用率
        - 知識庫覆蓋率
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluationRequest'
            examples:
              full_evaluation:
                summary: 完整評測
                value:
                  queries:
                    - id: "eval_001"
                      query: "你們的定價方案是什麼？"
                      category: "pricing"
                      difficulty: "easy"
                      expected_response_type: "rag"
                      expected_sources: ["kb_002"]
                      expected_keywords: ["基礎版", "專業版", "企業版"]
                      ground_truth: "MorningAI 提供三種定價方案..."
                  config:
                    accuracy_threshold: 0.95
                    response_time_threshold: 3.0
      responses:
        '200':
          description: 評測完成
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluationResponse'
              examples:
                successful_evaluation:
                  summary: 成功評測結果
                  value:
                    evaluation_id: "eval-20250105-001"
                    summary:
                      overall_metrics:
                        total_queries: 20
                        successful_queries: 20
                        success_rate: 1.0
                        overall_accuracy: 0.962
                        accuracy_target_met: true
                      performance_metrics:
                        avg_processing_time: 1.8
                        response_time_target_met: true
                        fast_response_rate: 0.95
                    report_url: "/evaluation/eval-20250105-001/report"
                    charts_url: "/evaluation/eval-20250105-001/charts"
                    evaluation_time: 45.2
        '400':
          description: 評測參數錯誤
        '429':
          description: 評測頻率超限

  /evaluation/{evaluation_id}/report:
    get:
      tags:
        - Evaluation System
      summary: 獲取評測報告
      description: 下載 Markdown 格式的詳細評測報告
      security:
        - BearerAuth: []
      parameters:
        - name: evaluation_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 報告下載成功
          content:
            text/markdown:
              schema:
                type: string
        '404':
          description: 評測記錄不存在

  /evaluation/{evaluation_id}/charts:
    get:
      tags:
        - Evaluation System
      summary: 獲取評測圖表
      description: 下載評測圖表壓縮包
      security:
        - BearerAuth: []
      parameters:
        - name: evaluation_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 圖表下載成功
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '404':
          description: 評測記錄不存在

  # 系統健康檢查
  /health:
    get:
      tags:
        - System
      summary: 系統健康檢查
      description: 檢查系統各組件狀態
      responses:
        '200':
          description: 系統健康
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [healthy, degraded, unhealthy]
                  timestamp:
                    type: string
                    format: date-time
                  version:
                    type: string
                  components:
                    type: object
                    properties:
                      database:
                        type: object
                        properties:
                          status:
                            type: string
                          response_time:
                            type: number
                      redis:
                        type: object
                        properties:
                          status:
                            type: string
                          response_time:
                            type: number
                      vector_db:
                        type: object
                        properties:
                          status:
                            type: string
                          vector_count:
                            type: integer
                          response_time:
                            type: number
                      openai_api:
                        type: object
                        properties:
                          status:
                            type: string
                          response_time:
                            type: number
              examples:
                healthy_system:
                  summary: 系統健康
                  value:
                    status: "healthy"
                    timestamp: "2025-01-05T15:30:00Z"
                    version: "3.1.0-t7"
                    components:
