name: CI

on:
  push:
    branches: [ main, staging ]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'constraints.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install deps
        run: pip install -r requirements.txt -c constraints.txt

      - name: Check prohibited dependencies
        run: |
          echo "🔍 Checking for prohibited dependencies..."
          
          # Check for aiohttp in requirements
          if grep -r "aiohttp" requirements.txt constraints.txt 2>/dev/null; then
            echo "❌ Found prohibited aiohttp dependency in requirements"
            echo "Use httpx instead of aiohttp"
            exit 1
          fi
          
          # Check for aiohttp imports in code
          if find . -name "*.py" -not -path "./.git/*" -not -path "./venv/*" -not -path "./.venv/*" -exec grep -l "import aiohttp\|from aiohttp" {} \; 2>/dev/null | grep -q .; then
            echo "❌ Found prohibited aiohttp imports in code:"
            find . -name "*.py" -not -path "./.git/*" -not -path "./venv/*" -not -path "./.venv/*" -exec grep -l "import aiohttp\|from aiohttp" {} \; 2>/dev/null
            echo "Use httpx instead of aiohttp"
            exit 1
          fi
          
          echo "✅ No prohibited dependencies found"

      - name: Run tests
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install
        run: |
          if [ -f package-lock.json ]; then npm ci --ignore-scripts; else yarn install --frozen-lockfile --ignore-scripts; fi
      - name: Lint & build
        run: |
          if [ -f package.json ]; then npm run lint --if-present || true; npm run build --if-present; fi

