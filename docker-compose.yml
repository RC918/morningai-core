version: '3.8'

services:
  # PostgreSQL 數據庫
  postgres:
    image: postgres:15-alpine
    container_name: morningai-postgres
    environment:
      POSTGRES_DB: morningai_dev
      POSTGRES_USER: morningai
      POSTGRES_PASSWORD: morningai_password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/morningai-api/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U morningai -d morningai_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - morningai-network

  # Redis 快取
  redis:
    image: redis:7-alpine
    container_name: morningai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - morningai-network

  # 後端 API
  backend:
    build:
      context: ./backend/morningai-api
      dockerfile: Dockerfile
    container_name: morningai-backend
    environment:
      - DATABASE_URL=postgresql://morningai:morningai_password@postgres:5432/morningai_dev
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=dev-secret-key-change-in-production
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - LINE_CHANNEL_ACCESS_TOKEN=${LINE_CHANNEL_ACCESS_TOKEN:-}
      - APP_ENV=development
      - DEBUG=true
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - ./backend/morningai-api/src:/app/src
      - ./backend/morningai-api/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - morningai-network

  # 前端應用
  frontend:
    build:
      context: ./frontend/morningai-web
      dockerfile: Dockerfile
    container_name: morningai-frontend
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
      - VITE_APP_ENV=development
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/morningai-web/src:/app/src
      - ./frontend/morningai-web/public:/app/public
    depends_on:
      - backend
    networks:
      - morningai-network

  # Nginx 反向代理 (可選，用於生產環境)
  nginx:
    image: nginx:alpine
    container_name: morningai-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - frontend
    networks:
      - morningai-network
    profiles:
      - production

  # Prometheus 監控
  prometheus:
    image: prom/prometheus:latest
    container_name: morningai-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - morningai-network
    profiles:
      - monitoring

  # Grafana 儀表板
  grafana:
    image: grafana/grafana:latest
    container_name: morningai-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - morningai-network
    profiles:
      - monitoring

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  morningai-network:
    driver: bridge

